[package]
name = "embassy-am2302"
version = "0.1.0"
edition = "2024"
authors = ["Jorge Andre Castro <georgeandrec@gmail.com>"]
license = "GPL-2.0-or-later"
description = "Driver async Embassy pour le capteur de température et d'humidité AM2302 (DHT22), compatible `no_std`"
repository = "https://github.com/jorgeandrecastro/embassy-am2302"
documentation = "https://docs.rs/embassy-am2302"
readme = "README.md"
keywords = ["embassy", "am2302", "dht22", "no-std", "embedded"]
categories = ["embedded", "no-std", "hardware-support"]

[dependencies]
embassy-rp = { version = "0.2", features = ["time-driver"] }
embassy-time = "0.3"
embassy-executor = { version = "0.6", features = ["arch-cortex-m", "executor-thread"] }
embassy-sync = "0.6"   # ← ajoute cette ligne

[profile.release]
opt-level = "z"       # Optimisation pour la taille minimale du binaire
lto = true            # Link-Time Optimization
codegen-units = 1
panic = "abort"       # Indispensable pour un environnement sans OS (no_std)
strip = true          # Nettoyage des symboles pour réduire le poids